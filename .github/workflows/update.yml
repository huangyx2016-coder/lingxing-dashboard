name: Build & Deploy Dashboard
on:
  push:
    paths:
      - 'lingxing_data.json'
      - 'silver_data.json'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: python build_lingxing.py
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy ${{ github.event.repository.updated_at }}'

      - name: Trigger silver dashboard
        run: |
          curl -s -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.SILVER_DISPATCH_TOKEN }}" \
            https://api.github.com/repos/huangyx2016-coder/silver-dashboard/actions/workflows/deploy.yml/dispatches \
            -d '{"ref":"master"}'
