name: Update Lingxing Dashboard
on:
  schedule:
    - cron: '50 0,8 * * *'  # 8:50 & 16:50 Beijing time
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests pycryptodome

      - env:
          LINGXING_APP_ID: ${{ secrets.LINGXING_APP_ID }}
          LINGXING_APP_SECRET: ${{ secrets.LINGXING_APP_SECRET }}
        run: python fetch_and_build.py

      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lingxing_data.json index.html
          git diff --staged --quiet || git commit -m "Auto update $(date +'%Y-%m-%d %H:%M')"
          git push

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy ${{ github.event.repository.updated_at }}'
